<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X (Twitter) Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="nav">
    <a href="/" class="back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Home
    </a>
    <span class="crumb">X (Twitter)</span>
  </div>

  <div class="card">
    <div class="head">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </div>
      <h1>X Downloader</h1>
      <p class="sub">Save videos & images from any X post</p>
    </div>

    <div class="field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.41 1.41M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.41-1.41" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <input type="text" id="urlInput" placeholder="Paste X (Twitter) post URL…" autocomplete="off" />
    </div>

    <button class="btn" id="downloadBtn">Download</button>
    <div class="status" id="status"></div>
    <div id="result"></div>
  </div>

  <footer>© 2026 | Developed by Siegfried Samá</footer>

  <script src="script.js"></script>
</body>
</html>
